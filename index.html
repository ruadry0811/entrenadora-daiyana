<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf8f9">
<title>Daiyana · Fit</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Nunito+Sans:opsz,wght@6..12,400;6..12,500;6..12,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#e8758a;--pink-soft:#f9e8ec;--pink-mid:#f2c4cc;--pink-deep:#c44e65;
  --lilac:#b89dd4;--lilac-soft:#f2edf9;--lilac-mid:#d8c8ee;
  --mint:#7dc4a8;--mint-soft:#e8f7f2;--mint-mid:#b8e0d2;
  --peach:#f0a87a;--peach-soft:#fdf0e8;
  --cream:#fdf8f9;--white:#ffffff;
  --text:#2a1520;--text-2:#6b3d50;--text-3:#a07080;
  --border:#f0dde2;--border-2:#e8c8d2;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--cream);color:var(--text);font-family:'Nunito Sans',sans-serif;font-size:15px}
body{display:flex;flex-direction:column}

/* HEADER */
.hdr{padding:calc(var(--safe-t)+14px) 18px 12px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-label{font-size:11px;color:var(--text-3);letter-spacing:.06em;margin-bottom:2px}
.hdr-name{font-family:'Nunito',sans-serif;font-size:21px;font-weight:800;color:var(--text);line-height:1}
.hdr-name span{color:var(--pink)}
.hdr-sub{font-size:11px;color:var(--text-3);margin-top:3px}
.fase-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid}

/* TABS */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 14px;font-size:12px;font-weight:700;color:var(--text-3);background:none;border:none;cursor:pointer;font-family:'Nunito Sans',sans-serif;position:relative;transition:color .15s}
.tab.on{color:var(--pink)}
.tab.on::after{content:'';position:absolute;bottom:0;left:10px;right:10px;height:2.5px;background:var(--pink);border-radius:2px}

/* SCROLL AREA */
.scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.body{padding:14px 16px calc(var(--safe-b)+24px)}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:14px 16px;margin-bottom:10px}
.card.pink{background:linear-gradient(145deg,#fff5f7,#ffeef2);border-color:var(--pink-mid)}
.card.lilac{background:linear-gradient(145deg,#f8f4ff,#f2edf9);border-color:var(--lilac-mid)}
.card.mint{background:linear-gradient(145deg,#f3fcf8,#e8f7f2);border-color:var(--mint-mid)}
.card-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px}
.card-title{font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:3px}
.card-desc{font-size:12px;color:var(--text-2);line-height:1.5}

/* PROGRESS */
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-track{height:7px;background:var(--pink-soft);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--peach));border-radius:10px;transition:width .5s}

/* BLOQUE */
.bloque-hdr{display:flex;align-items:center;gap:7px;padding:10px 0 7px;margin-top:2px;border-top:1px dashed var(--border-2)}
.bloque-hdr:first-child{border-top:none;padding-top:4px}
.bloque-dot{width:7px;height:7px;border-radius:50%;background:var(--pink);flex-shrink:0}
.bloque-name{font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:.05em;text-transform:uppercase}

/* EJ CARD */
.ej{background:var(--white);border:1.5px solid var(--border);border-radius:14px;margin-bottom:7px;overflow:hidden;transition:border-color .2s}
.ej.done{background:var(--mint-soft);border-color:var(--mint-mid)}
.ej.open{border-color:var(--pink-mid);box-shadow:0 2px 12px rgba(232,117,138,.12)}
.ej-top{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;cursor:pointer}
.ej-cb{width:24px;height:24px;border-radius:50%;border:2px solid var(--pink-mid);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s}
.ej.done .ej-cb{background:var(--mint);border-color:var(--mint)}
.ej-cb svg{display:none}
.ej.done .ej-cb svg{display:block}
.ej-body{flex:1;min-width:0}
.ej-name{font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
.ej.done .ej-name{color:var(--mint);text-decoration:line-through;text-decoration-color:var(--mint-mid)}
.ej-meta{font-size:11px;color:var(--text-3);margin-top:2px;font-variant-numeric:tabular-nums}
.ej-last{font-size:11px;font-weight:700;color:var(--pink);margin-top:3px}
.ej-nota{font-size:11px;color:var(--text-2);font-style:italic;margin-top:4px;line-height:1.45;display:none}
.ej.open .ej-nota{display:block}
.ej-chevron{font-size:16px;color:var(--text-3);transition:transform .2s;flex-shrink:0;margin-top:3px}
.ej.open .ej-chevron{transform:rotate(180deg);color:var(--pink)}

/* LOGGER */
.logger{display:none;padding:0 12px 12px;border-top:1px solid var(--border)}
.ej.open .logger{display:block}
.series-chips{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0 8px}
.s-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--mint-soft);border:1px solid var(--mint-mid);font-size:11px;font-weight:700;color:#2d7a60;font-variant-numeric:tabular-nums}
.s-chip .x{color:var(--mint);cursor:pointer;font-size:14px;line-height:1}
.log-inputs{display:flex;gap:7px;margin-bottom:7px}
.log-field{flex:1;display:flex;flex-direction:column;gap:3px}
.log-lbl{font-size:10px;font-weight:700;color:var(--text-3);text-align:center;text-transform:uppercase;letter-spacing:.06em}
.log-inp{background:var(--cream);border:1.5px solid var(--border-2);border-radius:10px;padding:10px 4px;font-size:18px;font-weight:800;text-align:center;color:var(--text);font-family:'Nunito',sans-serif;outline:none;width:100%;-webkit-appearance:none}
.log-inp:focus{border-color:var(--pink)}
.adj-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.adj{padding:8px 0;border-radius:9px;border:1.5px solid var(--border-2);background:var(--cream);font-size:12px;font-weight:800;color:var(--text-2);cursor:pointer;font-family:'Nunito',sans-serif;transition:background .12s}
.adj:active{background:var(--pink-soft);border-color:var(--pink-mid)}
.btn-add{width:100%;padding:11px;border-radius:11px;background:var(--pink);color:#fff;font-size:13px;font-weight:800;border:none;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity .15s}
.btn-add:active{opacity:.8}
.btn-add.done-btn{background:var(--mint)}
.btn-sec{width:100%;padding:9px;border-radius:10px;background:transparent;color:var(--text-3);font-size:12px;font-weight:700;border:1px solid var(--border-2);cursor:pointer;font-family:'Nunito Sans',sans-serif;margin-top:6px;transition:background .12s}
.btn-sec:active{background:var(--pink-soft)}
.log-saved{font-size:11px;color:var(--mint);text-align:center;font-weight:700;display:none;margin-top:5px}

/* CHECKIN */
.ci-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ci-field{display:flex;flex-direction:column;gap:5px}
.ci-label{font-size:11px;font-weight:700;color:var(--text-2)}
.slider-row{display:flex;align-items:center;gap:8px}
input[type=range]{flex:1;accent-color:var(--pink);cursor:pointer}
.sv{font-size:13px;font-weight:800;color:var(--pink);min-width:30px;text-align:right;font-family:'Nunito',sans-serif}
.e-row{display:flex;gap:4px}
.e-btn{flex:1;padding:9px 0;border-radius:9px;border:1.5px solid var(--border-2);background:var(--cream);font-size:13px;font-weight:800;color:var(--text-3);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.e-btn.on{background:var(--pink-soft);border-color:var(--pink-mid);color:var(--pink-deep)}
.agua-row{display:flex;gap:4px}
.a-btn{flex:1;padding:7px 0;border-radius:9px;border:1.5px solid var(--border-2);background:var(--cream);font-size:11px;font-weight:800;color:var(--text-3);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.a-btn.on{background:var(--lilac-soft);border-color:var(--lilac-mid);color:var(--lilac)}
.inp{width:100%;background:var(--cream);border:1.5px solid var(--border-2);border-radius:11px;padding:10px 12px;font-size:14px;color:var(--text);font-family:'Nunito Sans',sans-serif;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--pink)}
.inp::placeholder{color:var(--text-3)}

/* SCORE RING */
.ring-wrap{position:relative;width:58px;height:58px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800}

/* METRICS */
.m-grid{display:grid;gap:7px}
.m-grid.c3{grid-template-columns:repeat(3,1fr)}
.m-grid.c2{grid-template-columns:repeat(2,1fr)}
.m-box{background:var(--cream);border:1px solid var(--border);border-radius:12px;padding:9px 8px;text-align:center}
.m-box.g{background:var(--mint-soft);border-color:var(--mint-mid)}
.m-box.p{background:var(--pink-soft);border-color:var(--pink-mid)}
.m-box.l{background:var(--lilac-soft);border-color:var(--lilac-mid)}
.m-lbl{font-size:10px;color:var(--text-3);font-weight:600;margin-bottom:3px}
.m-val{font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;color:var(--text)}
.m-sub{font-size:10px;color:var(--text-3);margin-top:1px}

/* BANNERS */
.ban{border-radius:12px;padding:10px 13px;font-size:12px;line-height:1.55;margin-bottom:9px;font-weight:500}
.ban.p{background:var(--pink-soft);border:1px solid var(--pink-mid);color:var(--pink-deep)}
.ban.m{background:var(--mint-soft);border:1px solid var(--mint-mid);color:#1a6b4a}
.ban.l{background:var(--lilac-soft);border:1px solid var(--lilac-mid);color:#5a3a8a}
.ban.o{background:var(--peach-soft);border:1px solid #f5caa8;color:#7a3d10}

/* WEEK */
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.wk{border-radius:11px;padding:7px 3px;text-align:center;border:1px solid var(--border);background:var(--white)}
.wk.today{border-color:var(--pink);background:var(--pink-soft)}
.wk.done{border-color:var(--mint-mid);background:var(--mint-soft)}
.wk-d{font-size:10px;font-weight:700;color:var(--text-3);margin-bottom:3px}
.wk-i{font-size:14px;line-height:1}
.wk-dot{width:5px;height:5px;border-radius:50%;background:var(--border-2);margin:5px auto 2px}

/* PHASE */
.ph-item{display:flex;gap:11px;padding:10px 12px;border-radius:13px;margin-bottom:6px;border:1px solid var(--border);background:var(--white)}
.ph-item.now{border-color:var(--pink-mid);background:var(--pink-soft)}
.ph-em{font-size:24px;flex-shrink:0}
.ph-name{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--text)}
.ph-desc{font-size:11px;color:var(--text-2);margin-top:2px;line-height:1.4}
.ph-now{font-size:10px;font-weight:800;color:var(--pink);margin-top:3px;letter-spacing:.05em}

/* AJUSTES */
.dia-sel{background:var(--cream);border:1.5px solid var(--border-2);border-radius:9px;padding:6px 9px;font-size:12px;color:var(--text);font-family:'Nunito Sans',sans-serif;outline:none;cursor:pointer}
.dia-sel:focus{border-color:var(--pink)}
.ses-row{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:13px;border:1px solid var(--border);background:var(--white);margin-bottom:7px}

/* REST */
.rest-card{text-align:center;padding:28px 18px;background:linear-gradient(145deg,#fff5f7,#fff0f5);border:1px solid var(--pink-mid);border-radius:20px;margin-bottom:10px}

/* BTN PRIMARY */
.btn-p{width:100%;padding:13px;border-radius:13px;background:var(--pink);color:#fff;font-size:14px;font-weight:800;border:none;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 16px rgba(232,117,138,.25);transition:all .2s}
.btn-p:active{opacity:.85;transform:scale(.99)}
.btn-p.mint{background:var(--mint);box-shadow:0 4px 16px rgba(125,196,168,.25)}

/* PANEL */
.panel{animation:fu .2s ease both}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* SEG */
.seg-r{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:10px;margin-bottom:4px;border:1px solid}
.seg-r.n{background:var(--cream);border-color:var(--border)}
.seg-r.p{background:var(--pink-soft);border-color:var(--pink-mid)}
.seg-r.m{background:var(--mint-soft);border-color:var(--mint-mid)}
.seg-z{font-size:11px;color:var(--text-2)}
.seg-v{font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;color:var(--text)}
.seg-d{font-size:10px;font-weight:700;font-family:'Nunito',sans-serif;margin-left:4px}
.dn{color:var(--pink-deep)}.dm{color:#1a6b4a}

canvas{max-width:100%;width:100%;min-width:200px;display:block}

/* PROG EJ CHIPS */
.pej{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid;cursor:pointer;white-space:nowrap;font-family:'Nunito Sans',sans-serif;transition:all .15s}
.pej.on{background:var(--pink);color:#fff;border-color:var(--pink)}
.pej.off{background:var(--white);color:var(--text-3);border-color:var(--border-2)}
</style>
</head>

  <div class="hdr-row">
    <div>
      <div class="hdr-label">tu entrenadora personal ✨</div>
      <div class="hdr-name">Hola, <span>Daiyana</span> 🌸</div>
      <div class="hdr-sub" id="hdr-sub">Cargando...</div>

function hoy(){return new Date().toISOString().split('T')[0]}
function calcFase(c){
  if(!c?.ultimoPeriodo)return null;
  const d=Math.floor((Date.now()-new Date(c.ultimoPeriodo))/86400000)%(c.duracion||28);
  const dp=c.duracionPeriodo||5;
  if(d<dp)return'menstrual';
  if(d<(c.duracion||28)*.45)return'folicular';
  if(d<(c.duracion||28)*.55)return'ovulatoria';
  return'lutea';
}
function calcDiac(c){if(!c?.ultimoPeriodo)return null;return(Math.floor((Date.now()-new Date(c.ultimoPeriodo))/86400000)%(c.duracion||28))+1}
function calcSem(p){if(!p?.fechaInicio)return 1;return Math.min(Math.floor((Date.now()-new Date(p.fechaInicio))/604800000)+1,p.semanas||12)}
function calcScore(r){if(!r)return 0;const s=r.sueno||0,e=r.energia||0,fc=r.fcReposo||62,p=r.pasos||0;return Math.round(([s>=8?10:s>=7?8:s>=6?5:2,e*2,fc<=65?10:fc<=72?7:fc<=80?4:2,p>=10000?10:p>=7000?8:p>=5000?5:p>0?3:5].reduce((a,b)=>a+b,0))/4)}
function ejsFlat(s){return s?.bloques?s.bloques.flatMap(b=>b.ejercicios):(s?.ejercicios||[])}
function ultPeso(n){const fs=Object.keys(ST.logs).sort().reverse();for(const f of fs){const ej=ST.logs[f].ejercicios?.find(e=>e.nombre===n||e.n===n);if(ej?.series?.length){const mp=Math.max(...ej.series.map(s=>s.peso||0));if(mp>0)return mp;}}return null}
function ultSeries(n){const fs=Object.keys(ST.logs).sort().reverse();for(const f of fs){const ej=ST.logs[f].ejercicios?.find(e=>e.nombre===n||e.n===n);if(ej?.series?.length)return{f,series:ej.series};}return null}
function esc(s){return s.replace(/'/g,"\'").replace(/"/g,'&quot;')}
function cssid(s){try{return CSS.escape(s)}catch{return s.replace(/[^a-zA-Z0-9-_]/g,'_')}}

async function loadHevy(){
  // Siempre escribe al storage si aún no está
  const ya=await S.get('ef:hv');
  if(!ya){for(const[f,l]of Object.entries(HEVY))await S.set('ef:log:'+f,l);await S.set('ef:hv',true);}
}
function mergeHevyIntoLogs(logs){
  // Carga HEVY directamente en memoria — no depende de storage
  for(const[f,l]of Object.entries(HEVY)){if(!logs[f])logs[f]=l;}
  return logs;
}

async function load(){
  await loadHevy();
  const ciclo=await S.get('ef:ciclo');
  const comp=await S.get('ef:composicion');
  if(!comp){
    const bio=[{fecha:'2026-05-06',peso:61.2,porcGrasa:28.2,masaMuscular:22.34,masaLibreGrasa:40.22,agua:29.44,grasaVisceral:7.0,metabolismoBasal:1403,imc:24.21,
      segmentario:{mlg:{tronco:20.83,brazoDer:2.22,brazoIzq:2.17,piernaDer:7.52,piernaIzq:7.47},grasa:{tronco:11.6,brazoDer:0.82,brazoIzq:0.87,piernaDer:1.96,piernaIzq:2.01}},
      deltasMlg:{tronco:-1.73,brazoDer:-.12,brazoIzq:-.14,piernaDer:.26,piernaIzq:.20},
      deltasGrasa:{tronco:1.14,brazoDer:.06,brazoIzq:.08,piernaDer:-.43,piernaIzq:-.37},fuente:'Smart Fit Body'}];
    await S.set('ef:composicion',bio);ST.comp=bio;
  } else ST.comp=comp;
  await S.set('ef:plan',PLAN_DEFAULT);ST.plan=PLAN_DEFAULT;
  ST.ciclo=ciclo;ST.fase=calcFase(ciclo);ST.diac=calcDiac(ciclo);ST.sem=calcSem(PLAN_DEFAULT);
  const logs={};
  for(let i=0;i<400;i++){const d=new Date();d.setDate(d.getDate()-i);const f=d.toISOString().split('T')[0];const v=await S.get('ef:log:'+f);if(v)logs[f]=v;}
  // Siempre mezclar HEVY directo en memoria (no depende de storage)
  mergeHevyIntoLogs(logs);
  ST.logs=logs;
  const rec={};
  for(let i=0;i<14;i++){const d=new Date();d.setDate(d.getDate()-i);const f=d.toISOString().split('T')[0];const v=await S.get('ef:rec:'+f);if(v)rec[f]=v;}
  ST.rec=rec;
  render();
}

function render(){
  updateHdr();
  const body=document.getElementById('body');
  body.innerHTML='';
  const p=document.createElement('div');p.className='panel';
  switch(ST.tab){case'hoy':p.innerHTML=rHoy();break;case'semana':p.innerHTML=rSemana();break;case'prog':p.innerHTML=rProg();break;case'cuerpo':p.innerHTML=rCuerpo();break;case'ciclo':p.innerHTML=rCiclo();break;case'ajustes':p.innerHTML=rAjustes();break;}
  body.appendChild(p);
  setTimeout(afterRender,20);
}

function updateHdr(){

// ── HOY ──────────────────────────────────────────────────

          <input class="inp" type="number" id="ci-fc" placeholder="ej: 62" value="${rH?.fcReposo||''}"></div>
      </div>
      <div style="margin-bottom:12px"><div class="ci-label" style="margin-bottom:6px">💧 Agua</div>
        <div class="agua-row">${[1,1.5,2,2.5,3].map(l=>`<button class="a-btn${ST.ag===l?' on':''}" onclick="ST.ag=${l};document.querySelectorAll('.a-btn').forEach((b,i)=>b.classList.toggle('on',[1,1.5,2,2.5,3][i]===${l}))">${l}L</button>`).join('')}</div></div>
      <button class="btn-p" onclick="saveCI()">Guardar check-in ✨</button>
    </div>`;
  } else {
    const sc=calcScore(rH);const sc_c=sc>=7?'#1a6b4a':sc>=5?'#7a5000':'#c94060';
    const circ=2*Math.PI*22;
    h+=`<div class="card" style="display:flex;align-items:center;gap:14px">
      <div class="ring-wrap">
        <svg width="58" height="58" viewBox="0 0 58 58"><circle cx="29" cy="29" r="22" fill="none" stroke="#f0dde2" stroke-width="5"/>

          <div class="m-box ${rH.energia>=4?'g':rH.energia<=2?'p':''}"><div class="m-lbl">⚡</div><div class="m-val" style="font-size:13px">${rH.energia}/5</div></div>

function mkEj(ej,logH){
  const logEj=logH?.ejercicios?.find(e=>e.nombre===ej.n||e.n===ej.n);
  const done=!!logEj?.completado;
  const seriesHoy=logEj?.series||[];
  const isOpen=ST.ejA===ej.n;
  const us=ultSeries(ej.n);
  const cid=cssid(ej.n);

  let lastTxt='';
  if(us?.series?.length){
    const ss=us.series.filter(s=>s.reps||(s.peso&&s.peso>0));
    if(ss.length){
      const d=new Date(us.f);
      const ds=d.toLocaleDateString('es',{day:'numeric',month:'short'});
      const res=ss.slice(-3).map(s=>`${s.peso||'P/C'}${s.peso?'kg':''}×${s.reps}`).join(' · ');
      lastTxt=`📅 Última vez (${ds}): ${res}`;
    }
  }

  const e2=esc(ej.n);
  const ultP=ultPeso(ej.n)||'';

  let out=`<div class="ej${done?' done':''}${isOpen?' open':''}" id="ej-${cid}">
    <div class="ej-top" onclick="toggleEj('${e2}')">
      <div class="ej-cb"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="ej-body">
        <div class="ej-name">${ej.n}</div>
        <div class="ej-meta">${ej.s} series × ${ej.r}${ej.d?' · '+ej.d+'s descanso':''}</div>
        ${lastTxt?`<div class="ej-last">${lastTxt}</div>`:''}
        ${ej.nota?`<div class="ej-nota">💡 ${ej.nota}</div>`:''}
      </div>
      <div class="ej-chevron">▾</div>
    </div>
    <div class="logger">
      ${seriesHoy.length?`<div class="series-chips">${seriesHoy.map((s,i)=>`<span class="s-chip">${s.peso||'P/C'}${s.peso?'kg':''}×${s.reps}${s.rpe?' @'+s.rpe:''}<span class="x" onclick="event.stopPropagation();delS('${e2}',${i})">×</span></span>`).join('')}</div>`:'<div class="series-chips" id="sc-'+cid+'"></div>'}
      <div class="log-inputs">
        <div class="log-field"><div class="log-lbl">Peso kg</div><input class="log-inp" type="number" id="lp-${cid}" value="${ultP}" placeholder="kg" step="1.25" onclick="event.stopPropagation()"></div>
        <div class="log-field"><div class="log-lbl">Reps</div><input class="log-inp" type="number" id="lr-${cid}" placeholder="${String(ej.r).split('/')[0].split('-')[0]||'8'}" onclick="event.stopPropagation()"></div>
        <div class="log-field"><div class="log-lbl">RPE</div><input class="log-inp" type="number" id="lrpe-${cid}" placeholder="8" min="6" max="10" onclick="event.stopPropagation()"></div>
      </div>
      <div class="adj-row">
        ${[-2.5,-1.25,1.25,2.5].map(d=>`<button class="adj" onclick="event.stopPropagation();adjP('${e2}','${cid}',${d})">${d>0?'+':''}${d}</button>`).join('')}
      </div>
      <button class="btn-add${done?' done-btn':''}" onclick="event.stopPropagation();addS('${e2}','${cid}')">+ Agregar serie</button>
      ${done?`<button class="btn-sec" onclick="event.stopPropagation();markDone('${e2}',false)">↩ Desmarcar ejercicio</button>`:
        `<button class="btn-sec" onclick="event.stopPropagation();markDone('${e2}',true)">✓ Marcar como completado</button>`}
      <div id="lmsg-${cid}" class="log-saved">✨ Serie guardada</div>
    </div>
  </div>`;
  return out;
}

function toggleEj(n){ST.ejA=ST.ejA===n?null:n;render()}
function adjP(n,cid,d){const i=document.getElementById('lp-'+cid);if(!i)return;const v=parseFloat(i.value)||0;i.value=Math.max(0,v+d).toFixed(2).replace(/\.?0+$/,'')}

async function addS(n,cid){
  const peso=parseFloat(document.getElementById('lp-'+cid)?.value);
  const reps=parseInt(document.getElementById('lr-'+cid)?.value);
  const rpe=parseInt(document.getElementById('lrpe-'+cid)?.value)||null;
  if(!reps){document.getElementById('lr-'+cid)?.focus();return;}
  const f=hoy();
  const log=await S.get('ef:log:'+f)||{fecha:f,ejercicios:[],completada:false};
  const ei=log.ejercicios.findIndex(e=>e.nombre===n||e.n===n);
  const serie={...(peso?{peso}:{}),reps,...(rpe?{rpe}:{})};
  if(ei>=0)log.ejercicios[ei].series=[...(log.ejercicios[ei].series||[]),serie];
  else log.ejercicios.push({nombre:n,series:[serie],completado:false});
  await S.set('ef:log:'+f,log);ST.logs[f]=log;
  document.getElementById('lr-'+cid).value='';
  if(document.getElementById('lrpe-'+cid))document.getElementById('lrpe-'+cid).value='';
  const msg=document.getElementById('lmsg-'+cid);
  if(msg){msg.style.display='block';setTimeout(()=>{if(msg)msg.style.display='none'},1500)}
  const sc=document.getElementById('sc-'+cid)||document.querySelector(`#ej-${cid} .series-chips`);
  const ss=log.ejercicios.find(e=>e.nombre===n||e.n===n)?.series||[];
  const e2=esc(n);
  if(sc){sc.innerHTML=ss.map((s,i)=>`<span class="s-chip">${s.peso||'P/C'}${s.peso?'kg':''}×${s.reps}${s.rpe?' @'+s.rpe:''}<span class="x" onclick="event.stopPropagation();delS('${e2}',${i})">×</span></span>`).join('')}
  setTimeout(()=>document.getElementById('lr-'+cid)?.focus(),50);
}

async function delS(n,idx){
  const f=hoy();const log=await S.get('ef:log:'+f)||{fecha:f,ejercicios:[],completada:false};
  const ei=log.ejercicios.findIndex(e=>e.nombre===n||e.n===n);
  if(ei>=0)log.ejercicios[ei].series.splice(idx,1);
  await S.set('ef:log:'+f,log);ST.logs[f]=log;render();
}

async function markDone(n,val){
  const f=hoy();const log=await S.get('ef:log:'+f)||{fecha:f,ejercicios:[],completada:false};
  const ei=log.ejercicios.findIndex(e=>e.nombre===n||e.n===n);
  if(ei>=0)log.ejercicios[ei].completado=val;
  else log.ejercicios.push({nombre:n,series:[],completado:val});
  await S.set('ef:log:'+f,log);ST.logs[f]=log;ST.ejA=null;render();
}

async function saveCI(){
  const f=hoy();const pasos=parseFloat(document.getElementById('ci-p')?.value)||0;const fc=parseInt(document.getElementById('ci-fc')?.value)||0;
  const prev=await S.get('ef:rec:'+f)||{};
  const rec={...prev,sueno:ST.sue,energia:ST.en,agua:ST.ag,pasos:pasos?pasos*1000:(prev.pasos||0),fcReposo:fc||prev.fcReposo||null,checkinCompleto:true,fecha:f};
  await S.set('ef:rec:'+f,rec);ST.rec[f]=rec;render();
}
async function resetCI(){
  const f=hoy();const prev=await S.get('ef:rec:'+f)||{};
  await S.set('ef:rec:'+f,{...prev,checkinCompleto:false});ST.rec[f]={...(ST.rec[f]||{}),checkinCompleto:false};render();
}

// ── SEMANA ────────────────────────────────────────────────
function rSemana(){
  const dw=new Date().getDay();const plan=ST.plan||PLAN_DEFAULT;
  let comp=0,tot=plan.sesiones?.length||4;
  for(const s of(plan.sesiones||[])){const d=new Date();d.setDate(d.getDate()+(s.dia-dw));const f=d.toISOString().split('T')[0];if(ST.logs[f]?.completada)comp++;}
  let h=`<div class="card pink">
    <div class="card-label">adherencia semanal</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
      <div style="font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;color:var(--text)">${comp} de ${tot} sesiones</div>
      <div style="font-family:'Nunito',sans-serif;font-size:22px;font-weight:800;color:var(--pink)">${Math.round(comp/tot*100)}%</div>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${comp/tot*100}%"></div></div>
  </div>
  <div class="wk-grid">`;
  for(let d=0;d<7;d++){
    const ses=(plan.sesiones||[]).find(s=>s.dia===d);
    const fd=new Date();fd.setDate(fd.getDate()+(d-dw));const fstr=fd.toISOString().split('T')[0];
    const done=ST.logs[fstr]?.completada;
    const ico=done?'✓':ses?.tipo?.includes('cardio')&&!ses?.tipo?.includes('fuerza')?'🥊':ses?.tipo?.includes('fuerza')?'🏋️':'';
    h+=`<div class="wk${d===dw?' today':''}${done&&ses?' done':''}">
      <div class="wk-d">${DIAS[d]}</div>
      ${ses?`<div class="wk-i">${ico||'🌸'}</div>`:`<div class="wk-dot"></div>`}
    </div>`;
  }
  h+=`</div>`;

  // 7-day recovery
  const dias7=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const f=d.toISOString().split('T')[0];const r=ST.rec[f];if(r?.checkinCompleto)dias7.push({f:f.slice(5),s:calcScore(r)});}
  if(dias7.length>0){
    h+=`<div class="card"><div class="card-label">recuperación 7 días</div>
      <div style="display:flex;gap:5px;align-items:flex-end;height:44px;margin:8px 0">
        ${dias7.map(d=>{const ht=Math.round(d.s/10*44);const c=d.s>=7?'var(--mint)':d.s>=5?'var(--peach)':'var(--pink)';
          return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">

function rProg(){
  const plan=ST.plan||PLAN_DEFAULT;
  const dw=new Date().getDay();
  const sesH=plan.sesiones?.find(s=>s.dia===dw);
  const ejsH=sesH?ejsFlat(sesH).map(e=>e.n):[];
  // Nombres exactos del historial Hevy con datos de peso
  const ejConDatos=['Peso Muerto Rumano (Barra)','Sentadilla Búlgara','Remo Inclinado (Barra)','Dominada (Asistida)','Jalón al Pecho (Máquina)','Press de Piernas','Extensión de Pierna','Curl de Piernas Acostado (Máquina)','Aducción de Caderas','Abducción de Caderas','Hip Thrust (Smith Machine)','Patada de Glúteo con Cable','Curl de Bíceps (Cable)','Straight Arm Lat Pulldown (Cable)','Jalón al Pecho a Un Brazo','Elevación de cadera (Máquina Smith)','Hip thrust (barra o mancuerna)','Remo con Mancuerna','Press de Hombros  (Mancuerna)','Extensión de tríceps en polea','Curl Martillo (Mancuerna)'];
  const ejOrd=[...new Set([...ejsH,...ejConDatos])];
  // Seleccionar por defecto el primer ejercicio que tenga datos en el historial
  function primerEjConDatos(){
    for(const n of ejOrd){const d=calcP(n);if(d.length>=1)return n;}
    return ejOrd[0];
  }
  const ejSel=ST.ejSel||primerEjConDatos();

  function calcP(n){return Object.entries(ST.logs).sort(([a],[b])=>a.localeCompare(b)).map(([f,l])=>{const ej=l.ejercicios?.find(e=>e.nombre===n||e.n===n);if(!ej?.series?.length)return null;const mx=Math.max(...ej.series.map(s=>s.peso||0));if(!mx)return null;const rp=ej.series.find(s=>s.peso===mx)?.reps||1;return{f:f.slice(5),p:mx,rm:+(mx*(1+rp/30)).toFixed(1)};}).filter(Boolean)}

  const datos=calcP(ejSel);const ult=datos[datos.length-1];const pen=datos[datos.length-2];
  const tend=pen?(ult?.p>pen.p?'↑':ult?.p<pen.p?'↓':'→'):null;
  const tC=tend==='↑'?'var(--mint)':tend==='↓'?'var(--pink)':'var(--peach)';
  const ultP=ultPeso(ejSel)||'';
  const serH=ST.logs[hoy()]?.ejercicios?.find(e=>e.nombre===ejSel||e.n===ejSel)?.series||[];
  const e2=esc(ejSel);const cid2=cssid(ejSel);

  let h='';
  if(sesH&&ejsH.length){
    h+=`<div class="card pink"><div class="card-label">sesión de hoy</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:5px">
        ${ejsH.map(e=>`<button onclick="ST.ejSel='${esc(e)}';render()" style="padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:all .15s;background:${ejSel===e?'var(--pink)':'var(--white)'};border-color:${ejSel===e?'var(--pink)':'var(--pink-mid)'};color:${ejSel===e?'#fff':'var(--pink-deep)'}">${e.split(' ').slice(0,3).join(' ')}</button>`).join('')}
      </div></div>`;
  }

  h+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div><div class="card-label">registrar serie</div><div class="card-title" style="font-size:15px">${ejSel}</div></div>
      ${ult?`<div style="text-align:right"><div style="font-size:10px;color:var(--text-3)">1RM est.</div><div style="font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;color:var(--pink)">${ult.rm}kg</div></div>`:''}
    </div>
    ${serH.length?`<div class="series-chips">${serH.map((s,i)=>`<span class="s-chip">${s.peso||'P/C'}${s.peso?'kg':''}×${s.reps}${s.rpe?' @'+s.rpe:''}<span class="x" onclick="delS2('${e2}',${i})">×</span></span>`).join('')}</div>`:''}
    <div class="log-inputs">
      <div class="log-field"><div class="log-lbl">Peso kg</div><input class="log-inp" type="number" id="lp2" value="${ultP}" placeholder="kg" step="1.25"></div>
      <div class="log-field"><div class="log-lbl">Reps</div><input class="log-inp" type="number" id="lr2" placeholder="8"></div>
      <div class="log-field"><div class="log-lbl">RPE</div><input class="log-inp" type="number" id="lrpe2" placeholder="8" min="6" max="10"></div>
    </div>
    <div class="adj-row">${[-2.5,-1.25,1.25,2.5].map(d=>`<button class="adj" onclick="const i=document.getElementById('lp2');if(i){const v=parseFloat(i.value)||0;i.value=Math.max(0,v+(${d})).toFixed(2).replace(/\.?0+$/,'')}">${d>0?'+':''}${d}</button>`).join('')}</div>
    <button class="btn-p" onclick="addS2('${e2}')">+ Agregar serie</button>
    <div id="lmsg2" class="log-saved">✨ Serie guardada</div>
  </div>`;

  if(datos.length>=1){
    h+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div><div class="card-label">progresión histórica</div><div style="font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;color:var(--text)">${ult?.p}kg</div></div>
        ${tend?`<div style="font-family:'Nunito',sans-serif;font-size:28px;font-weight:800;color:${tC}">${tend}</div>`:''}
      </div>
      <canvas id="chart2" height="90" style="width:100%;display:block;min-height:90px"></canvas>
      <div style="font-size:10px;color:var(--text-3);text-align:center;margin-top:5px">${datos.length} sesiones registradas</div>
    </div>`;
  }

  // Solo mostrar ejercicios que tengan al menos 1 dato
  const ejConHistorial=ejOrd.filter(e=>calcP(e).length>=1);
  const ejSinHistorial=ejOrd.filter(e=>calcP(e).length===0).slice(0,6);
  h+=`<div class="card"><div class="card-label" style="margin-bottom:8px">ejercicios con historial (${ejConHistorial.length})</div>
    <div style="overflow-x:auto;scrollbar-width:none"><div style="display:flex;gap:6px;min-width:max-content;padding-bottom:2px">
      ${ejConHistorial.slice(0,16).map(e=>`<button class="pej ${e===ejSel?'on':'off'}" onclick="ST.ejSel='${esc(e)}';render()">${e.split(' ').slice(0,3).join(' ')}</button>`).join('')}
    </div></div>
    ${ejSinHistorial.length?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><div style="font-size:10px;color:var(--text-3);margin-bottom:5px;font-weight:700">SIN DATOS AÚN</div><div style="display:flex;flex-wrap:wrap;gap:4px">${ejSinHistorial.map(e=>`<button class="pej off" onclick="ST.ejSel='${esc(e)}';render()" style="opacity:.5">${e.split(' ').slice(0,2).join(' ')}</button>`).join('')}</div></div>`:''}
  </div>`;

  window._chartDatos = datos;
  // Intentar dibujar en múltiples momentos para asegurar que el canvas tenga ancho
  function tryDraw(attempts){
    const cv=document.getElementById('chart2');
    if(!cv) return;
    const w=cv.offsetWidth||cv.getBoundingClientRect().width||cv.parentElement?.getBoundingClientRect().width;
    if(w>0){ drawChart(datos); return; }
    if(attempts>0) setTimeout(()=>tryDraw(attempts-1),100);
  }
  setTimeout(()=>tryDraw(8),40);
  return h;
}

async function addS2(n){
  const peso=parseFloat(document.getElementById('lp2')?.value);
  const reps=parseInt(document.getElementById('lr2')?.value);
  const rpe=parseInt(document.getElementById('lrpe2')?.value)||null;
  if(!reps){document.getElementById('lr2')?.focus();return;}
  const f=hoy();const log=await S.get('ef:log:'+f)||{fecha:f,ejercicios:[],completada:false};
  const ei=log.ejercicios.findIndex(e=>e.nombre===n||e.n===n);
  const serie={...(peso?{peso}:{}),reps,...(rpe?{rpe}:{})};
  if(ei>=0)log.ejercicios[ei].series=[...(log.ejercicios[ei].series||[]),serie];
  else log.ejercicios.push({nombre:n,series:[serie]});
  await S.set('ef:log:'+f,log);ST.logs[f]=log;
  document.getElementById('lr2').value='';
  if(document.getElementById('lrpe2'))document.getElementById('lrpe2').value='';
  const msg=document.getElementById('lmsg2');
  if(msg){msg.style.display='block';setTimeout(()=>{if(msg)msg.style.display='none'},1500)}
  render();
}
async function delS2(n,idx){
  const f=hoy();const log=await S.get('ef:log:'+f)||{fecha:f,ejercicios:[],completada:false};
  const ei=log.ejercicios.findIndex(e=>e.nombre===n||e.n===n);
  if(ei>=0)log.ejercicios[ei].series.splice(idx,1);
  await S.set('ef:log:'+f,log);ST.logs[f]=log;render();
}

function drawChart(datos){
  const c=document.getElementById('chart2');if(!c||!datos.length)return;
  const ctx=c.getContext('2d');const dpr=window.devicePixelRatio||1;
  const W=c.offsetWidth||c.getBoundingClientRect().width||c.parentElement?.offsetWidth||300;const H=90;
  c.width=W*dpr;c.height=H*dpr;ctx.scale(dpr,dpr);
  const ps=datos.map(d=>d.p);const mn=Math.min(...ps)*.97,mx=Math.max(...ps)*1.03;
  const pad={l:28,r:6,t:6,b:18};const w=W-pad.l-pad.r,h=H-pad.t-pad.b;
  function px(i){return pad.l+(i/(datos.length-1||1))*w}function py(v){return pad.t+h-((v-mn)/(mx-mn||1))*h}
  ctx.strokeStyle='rgba(232,117,138,.1)';ctx.lineWidth=1;
  for(let i=0;i<3;i++){const y=pad.t+h*(i/2);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+w,y);ctx.stroke();ctx.fillStyle='rgba(160,112,128,.55)';ctx.font='9px Nunito Sans,sans-serif';ctx.textAlign='right';ctx.fillText((mn+(mx-mn)*(1-i/2)).toFixed(0),pad.l-3,y+3);}
  const gr=ctx.createLinearGradient(0,pad.t,0,pad.t+h);gr.addColorStop(0,'rgba(232,117,138,.18)');gr.addColorStop(1,'rgba(232,117,138,0)');
  ctx.beginPath();ctx.moveTo(px(0),py(datos[0].p));datos.forEach((d,i)=>ctx.lineTo(px(i),py(d.p)));
  ctx.lineTo(px(datos.length-1),H-pad.b);ctx.lineTo(pad.l,H-pad.b);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
  ctx.beginPath();ctx.strokeStyle='#e8758a';ctx.lineWidth=2;ctx.lineJoin='round';
  datos.forEach((d,i)=>i===0?ctx.moveTo(px(i),py(d.p)):ctx.lineTo(px(i),py(d.p)));ctx.stroke();
  datos.forEach((d,i)=>{ctx.beginPath();ctx.arc(px(i),py(d.p),3,0,Math.PI*2);ctx.fillStyle='#e8758a';ctx.fill()});
  ctx.fillStyle='rgba(160,112,128,.55)';ctx.font='9px Nunito Sans,sans-serif';ctx.textAlign='center';
  if(datos[0])ctx.fillText(datos[0].f,px(0),H-pad.b+12);
  if(datos.length>1)ctx.fillText(datos[datos.length-1].f,px(datos.length-1),H-pad.b+12);
}

      <div><div style="font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px">Primer día del último período</div>
        <input class="inp" type="date" id="cp" value="${c?.ultimoPeriodo||''}"></div>
      <div style="display:flex;gap:8px">
        <div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px">Duración ciclo (días)</div>
          <input class="inp" type="number" id="cd" value="${c?.duracion||25}" min="21" max="35"></div>
        <div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px">Duración período</div>
          <input class="inp" type="number" id="cpd" value="${c?.duracionPeriodo||4}" min="2" max="8"></div>
      </div>
      <button class="btn-p" onclick="saveCiclo()">Actualizar ciclo ✨</button>
    </div></div>
  <div class="card"><div class="card-label">guía por fase</div><div style="margin-top:8px">`;
  for(const[k,fs]of Object.entries(FASES)){
    const now=ST.fase===k;
    h+=`<div class="ph-item${now?' now':''}">
      <div class="ph-em">${fs.e}</div>
      <div><div class="ph-name">${fs.l}</div><div class="ph-desc">${fs.int}</div>${now?`<span class="ph-now">← ESTÁS AQUÍ</span>`:''}</div>
    </div>`;
  }
  h+=`</div></div>`;
  return h;
}
async function saveCiclo(){
  const up=document.getElementById('cp').value;const dur=parseInt(document.getElementById('cd').value)||25;const dp=parseInt(document.getElementById('cpd').value)||4;
  const ciclo={ultimoPeriodo:up,duracion:dur,duracionPeriodo:dp};
  await S.set('ef:ciclo',ciclo);ST.ciclo=ciclo;ST.fase=calcFase(ciclo);ST.diac=calcDiac(ciclo);render();
}

// ── AJUSTES ───────────────────────────────────────────────
function rAjustes(){
  const plan=ST.plan||PLAN_DEFAULT;
  let h=`<div class="card">
    <div class="card-label">distribución de sesiones</div>
    <div style="font-size:12px;color:var(--text-2);margin:6px 0 12px;line-height:1.5">Cambia el día de cada sesión. Se guarda automáticamente.</div>`;
  plan.sesiones?.forEach((s,i)=>{
    h+=`<div class="ses-row">
      <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--text)">${s.nombre}</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:1px">${s.tipo||'fuerza'} · ${s.duracion}min</div></div>
      <select class="dia-sel" onchange="changeDia(${i},this.value)">
        ${[0,1,2,3,4,5,6].map(d=>`<option value="${d}"${s.dia===d?' selected':''}>${DIASF[d]}</option>`).join('')}
      </select></div>`;
  });
  h+=`</div>`;
  const dCon=new Set(plan.sesiones?.map(s=>s.dia)||[]);
  h+=`<div class="card"><div class="card-label">resumen de la semana</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">
      ${[0,1,2,3,4,5,6].map(d=>{const ses=plan.sesiones?.find(s=>s.dia===d);return`<div style="padding:7px 11px;border-radius:12px;border:1px solid;font-size:11px;font-weight:700;background:${ses?'var(--pink-soft)':'var(--cream)'};border-color:${ses?'var(--pink-mid)':'var(--border)'};color:${ses?'var(--pink-deep)':'var(--text-3)'}">
        <div>${DIASF[d]}</div><div style="font-size:10px;font-weight:500;margin-top:1px;color:var(--text-3)">${ses?ses.tipo:'descanso'}</div>
      </div>`;}).join('')}
    </div></div>`;
  h+=`<div class="card mint"><div class="card-label">historial hevy</div>
    <div style="font-size:13px;color:var(--text-2);margin:5px 0 9px">45 sesiones · oct 2025 → may 2026</div>
    <div class="ban m" style="margin-bottom:0">✓ Historial cargado automáticamente al abrir la app</div>
  </div>`;
  h+=`<div class="card"><div class="card-label">reiniciar datos</div>
    <div style="font-size:12px;color:var(--text-3);margin:5px 0 10px">Borra todo el progreso. No se puede deshacer.</div>
    <button class="btn-sec" style="color:var(--pink-deep);border-color:var(--pink-mid)" onclick="resetAll()">⚠️ Borrar todos los datos</button>
  </div>`;
  return h;
}
async function changeDia(idx,val){
  const plan=JSON.parse(JSON.stringify(ST.plan||PLAN_DEFAULT));plan.sesiones[idx].dia=parseInt(val);
  await S.set('ef:plan',plan);ST.plan=plan;render();
}
async function resetAll(){
  if(!confirm('¿Segura? Esto borra todo.'))return;
  for(let i=0;i<90;i++){const d=new Date();d.setDate(d.getDate()-i);try{await window.storage.delete('ef:log:'+d.toISOString().split('T')[0])}catch{}}
  for(const k of['ef:ciclo','ef:composicion','ef:plan','ef:hv']){try{await window.storage.delete(k)}catch{}}
  ST={tab:'ajustes',ciclo:null,fase:null,diac:null,plan:null,logs:{},comp:[],rec:{},en:3,sue:7.5,ag:2,ejA:null,ejSel:null,sem:1};
  await load();
}

function afterRender(){
  if(window._chartDatos?.length){
    function tryDraw2(n){
      const cv=document.getElementById('chart2');
      if(!cv)return;
      const w=cv.offsetWidth||cv.getBoundingClientRect().width;
      if(w>0){drawChart(window._chartDatos);return;}
      if(n>0)setTimeout(()=>tryDraw2(n-1),120);
    }
    tryDraw2(5);
  }
}

document.addEventListener('DOMContentLoaded',async()=>{
  document.getElementById('tabs').addEventListener('click',e=>{
    const btn=e.target.closest('.tab');if(!btn)return;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    btn.classList.add('on');ST.tab=btn.dataset.t;ST.ejA=null;render();
  });
  await load();
});
</script>
</body>
</html>

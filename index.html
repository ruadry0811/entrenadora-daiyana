<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>Entrenadora · Daiyana</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:rgba(255,255,255,0.92);--muted:rgba(255,255,255,0.38);--dim:rgba(255,255,255,0.16);--accent:#e8ff6b;--accent-dim:rgba(232,255,107,0.12);--red:#ff6b6b;--green:#6bffb8;--violet:#c084fc;--amber:#fbbf24;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif}
body{display:flex;flex-direction:column}
.header{padding:calc(var(--safe-top) + 16px) 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start}
.header-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px}
.header-title{font-size:20px;font-weight:700;line-height:1.2}
.header-sub{font-size:12px;color:var(--muted);margin-top:2px}
.fase-badge{padding:5px 12px;border-radius:100px;font-size:11px;font-weight:600;border:1px solid;white-space:nowrap}
.tabs{display:flex;gap:6px;padding:10px 20px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;border-radius:100px;font-size:12px;font-weight:600;white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'Syne',sans-serif}
.tab.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent)}
.content{flex:1;overflow-y:auto;padding:16px 20px calc(var(--safe-bot) + 20px);overscroll-behavior:contain}
.content::-webkit-scrollbar{display:none}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px}
.card-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.card-title{font-size:17px;font-weight:700;margin-bottom:4px}
.metrics-grid{display:grid;gap:8px}
.metrics-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.metrics-grid.cols-2{grid-template-columns:repeat(2,1fr)}
.metric-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.metric-box.alert{background:rgba(255,107,107,0.08);border-color:rgba(255,107,107,0.2)}
.metric-box.good{background:rgba(107,255,184,0.06);border-color:rgba(107,255,184,0.15)}
.metric-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.metric-value{font-size:14px;font-weight:700}
.metric-sub{font-size:10px;color:var(--muted);margin-top:2px}
.ej-row{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.ej-row:last-child{border-bottom:none}
.ej-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--dim);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s}
.ej-check.done{background:var(--accent);border-color:var(--accent)}
.ej-check svg{display:none;width:12px;height:10px}
.ej-check.done svg{display:block}
.ej-info{flex:1}
.ej-name{font-size:14px;font-weight:600}
.ej-detail{font-size:11px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace}
.ej-done .ej-name{opacity:.35;text-decoration:line-through}
.progress-wrap{margin:8px 0}
.progress-track{height:6px;background:rgba(255,255,255,0.08);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;transition:width .6s ease}
.energy-stars{display:flex;gap:4px}
.star{flex:1;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Syne',sans-serif}
.star.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.seg-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:10px;margin-bottom:4px;border:1px solid}
.seg-row.neutral{background:rgba(255,255,255,0.02);border-color:var(--border)}
.seg-row.alert{background:rgba(255,107,107,0.06);border-color:rgba(255,107,107,0.18)}
.seg-row.good{background:rgba(107,255,184,0.05);border-color:rgba(107,255,184,0.14)}
.seg-zona{font-size:12px;color:var(--muted)}
.seg-right{text-align:right}
.seg-val{font-size:13px;font-weight:700}
.seg-delta{font-size:11px;font-family:'DM Mono',monospace;margin-left:6px}
.delta-neg{color:var(--red)}
.delta-pos{color:var(--green)}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-cell{border-radius:12px;padding:8px 4px;text-align:center;border:1px solid var(--border);background:rgba(255,255,255,0.02)}
.day-cell.today{border-color:var(--accent);background:var(--accent-dim)}
.day-cell.done{background:rgba(107,255,184,0.06);border-color:rgba(107,255,184,0.14)}
.day-name{font-size:10px;color:var(--muted);margin-bottom:5px}
.day-icon{font-size:16px;line-height:1}
.day-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);margin:5px auto 0}
.hc-btn{width:100%;padding:14px;border-radius:14px;border:1px solid;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s}
.hc-btn.primary{background:var(--accent);color:#0a0a0a;border-color:var(--accent)}
.hc-btn.primary:active{opacity:.8;transform:scale(.98)}
.hc-btn.secondary{background:var(--surface);color:var(--text);border-color:var(--border)}
.hc-btn.secondary:active{opacity:.7}
.inp{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:11px 14px;font-size:14px;color:var(--text);font-family:'Syne',sans-serif;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
.inp-row{display:flex;gap:8px}
.inp-row .inp{flex:1}
.slider-wrap{display:flex;align-items:center;gap:10px}
input[type=range]{flex:1;accent-color:var(--accent);height:4px}
.slider-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);min-width:32px;text-align:right}
.phase-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:6px;border:1px solid var(--border)}
.phase-row.current{border-color:rgba(232,255,107,0.3);background:var(--accent-dim)}
.phase-emoji{font-size:20px}
.phase-info{flex:1}
.phase-name{font-size:13px;font-weight:700}
.phase-desc{font-size:11px;color:var(--muted);margin-top:1px}
.phase-now{font-size:10px;color:var(--accent);font-family:'DM Mono',monospace}
.banner{border-radius:12px;padding:12px 14px;font-size:12px;line-height:1.5;margin-bottom:10px}
.banner.amber{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);color:rgba(251,191,36,0.9)}
.banner.red{background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.2);color:rgba(255,107,107,0.9)}
.banner.violet{background:rgba(192,132,252,0.08);border:1px solid rgba(192,132,252,0.2);color:rgba(192,132,252,0.9)}
.banner.green{background:rgba(107,255,184,0.06);border:1px solid rgba(107,255,184,0.14);color:rgba(107,255,184,0.9)}
.divider{height:1px;background:var(--border);margin:12px 0}
.row-between{display:flex;justify-content:space-between;align-items:center}
.btn-sm{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s}
.btn-sm:active{opacity:.7}
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:600;border:1px solid}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--dim);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:32px 20px;color:var(--muted)}
.empty-state .e-icon{font-size:36px;margin-bottom:8px}
.empty-state p{font-size:13px}
.empty-state .e-sub{font-size:11px;margin-top:4px;color:var(--dim)}
canvas{max-width:100%}
.panel{animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
select.inp{color:var(--text)}
select.inp option{background:#1a1a1a}
.dia-select{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:6px 10px;font-size:12px;color:var(--text);font-family:'Syne',sans-serif;outline:none;cursor:pointer}
.dia-select:focus{border-color:var(--accent)}
</style>
</head>

// ── CYCLE ──────────────────────────────────────────────────
function calcFase(c){
  if(!c?.ultimoPeriodo)return null;
  const dias=Math.floor((Date.now()-new Date(c.ultimoPeriodo))/86400000)%(c.duracion||28);
  const dp=c.duracionPeriodo||5;
  if(dias<dp)return 'menstrual';
  if(dias<(c.duracion||28)*0.45)return 'folicular';
  if(dias<(c.duracion||28)*0.55)return 'ovulatoria';
  return 'lutea';
}
function calcDiaCiclo(c){
  if(!c?.ultimoPeriodo)return null;
  return(Math.floor((Date.now()-new Date(c.ultimoPeriodo))/86400000)%(c.duracion||28))+1;
}
function calcSemana(p){
  if(!p?.fechaInicio)return 1;
  return Math.min(Math.floor((Date.now()-new Date(p.fechaInicio))/604800000)+1,p.semanas||12);
}
function calcScore(rec){
  if(!rec)return 0;
  const s=rec.sueno||0,e=rec.energia||0,fc=rec.fcReposo||62,p=rec.pasos||0;
  return Math.round(([s>=8?10:s>=7?8:s>=6?5:2, e*2, fc<=65?10:fc<=72?7:fc<=80?4:2, p>=10000?10:p>=7000?8:p>=5000?5:p>0?3:5].reduce((a,b)=>a+b,0))/4);
}

// ── HEVY AUTO-LOAD ─────────────────────────────────────────
async function cargarHevySiNecesario(){
  const ya = await S.get('ef:hevy:cargado');
  if(ya) return;
  for(const [f,log] of Object.entries(HEVY_LOGS)){
    await S.set('ef:log:'+f, log);
  }
  await S.set('ef:hevy:cargado', true);
  state.hevyCargado = true;
}

// ── LOAD ───────────────────────────────────────────────────
async function loadState(){
  await cargarHevySiNecesario();
  const ciclo = await S.get('ef:ciclo');
  let plan = await S.get('ef:plan');
  const comp = await S.get('ef:composicion');
  const hevyCargado = await S.get('ef:hevy:cargado');

  // Bio inicial si no existe
  if(!comp){
    const bio=[{fecha:'2026-05-06',peso:61.2,porcGrasa:28.2,masaMuscular:22.34,masaLibreGrasa:40.22,agua:29.44,grasaVisceral:7.0,metabolismoBasal:1403,imc:24.21,
      segmentario:{mlg:{tronco:20.83,brazoDer:2.22,brazoIzq:2.17,piernaDer:7.52,piernaIzq:7.47},grasa:{tronco:11.6,brazoDer:0.82,brazoIzq:0.87,piernaDer:1.96,piernaIzq:2.01}},
      deltasMlg:{tronco:-1.73,brazoDer:-0.12,brazoIzq:-0.14,piernaDer:+0.26,piernaIzq:+0.20},deltasGrasa:{tronco:+1.14,brazoDer:+0.06,brazoIzq:+0.08,piernaDer:-0.43,piernaIzq:-0.37},
      fuente:'Smart Fit Body',notas:'Medición inicial'}];
    await S.set('ef:composicion',bio);
    state.composicion=bio;
  } else { state.composicion=comp; }

  if(!plan){ await S.set('ef:plan',PLAN_DEFAULT); plan=PLAN_DEFAULT; }

  state.ciclo=ciclo; state.fase=calcFase(ciclo); state.diaDelCiclo=calcDiaCiclo(ciclo);
  state.plan=plan; state.semana=calcSemana(plan); state.hevyCargado=!!hevyCargado;

  const logs={};
  for(let i=0;i<90;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const f=d.toISOString().split('T')[0];
    const v=await S.get('ef:log:'+f);
    if(v) logs[f]=v;
  }
  state.logs=logs;

  const rec={};
  for(let i=0;i<14;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const f=d.toISOString().split('T')[0];
    const v=await S.get('ef:rec:'+f);
    if(v) rec[f]=v;
  }
  state.rec=rec;

  const hoy=new Date().toISOString().split('T')[0];
  if(state.logs[hoy]?.completada) state.logGuardado=true;
  render();
}

// ── RENDER ─────────────────────────────────────────────────
function render(){
  updateHeader();
  const content=document.getElementById('content');
  content.innerHTML='';
  const panel=document.createElement('div');
  panel.className='panel';
  switch(state.tab){
    case 'hoy': panel.innerHTML=renderHoy(); break;
    case 'semana': panel.innerHTML=renderSemana(); break;
    case 'progresion': panel.innerHTML=renderProgresion(); break;
    case 'cuerpo': panel.innerHTML=renderCuerpo(); break;
    case 'ciclo': panel.innerHTML=renderCiclo(); break;
    case 'ajustes': panel.innerHTML=renderAjustes(); break;
  }
  content.appendChild(panel);
}

function updateHeader(){
  const f=state.fase?FASES[state.fase]:null;
  const badge=document.getElementById('fase-badge');
  const sub=document.getElementById('plan-sub');
  sub.textContent='Sem. '+state.semana+' de '+(state.plan?.semanas||12)+' · Recomposición';
  if(f){
    badge.style.display='inline-block';
    badge.textContent=f.emoji+' '+f.label;
    badge.style.background=f.badgeBg; badge.style.borderColor=f.badgeBorder; badge.style.color=f.badgeColor;
  } else { badge.style.display='none'; }
}

function toggleCheck(i){
  state.checked[i]=!state.checked[i];

  if(chk) chk.classList.toggle('done',state.checked[i]);
}
function setEnergia(n){state.energia=n;document.querySelectorAll('.energy-stars .star').forEach((s,i)=>s.classList.toggle('on',i<n));}
function setAgua(l){state.agua=l;render();}

async function guardarCheckin(){
  const hoy=new Date().toISOString().split('T')[0];
  const pasos=parseFloat(document.getElementById('ci-pasos')?.value)||0;
  const fc=parseInt(document.getElementById('ci-fc')?.value)||0;
  const prev=await S.get('ef:rec:'+hoy)||{};
  const rec={...prev,sueno:state.sueno,energia:state.energia,agua:state.agua,
    pasos:pasos?pasos*1000:(prev.pasos||0),fcReposo:fc||prev.fcReposo||null,
    checkinCompleto:true,fecha:hoy};
  await S.set('ef:rec:'+hoy,rec);
  state.rec[hoy]=rec;
  render();
}
async function resetCheckin(){
  const hoy=new Date().toISOString().split('T')[0];
  const prev=await S.get('ef:rec:'+hoy)||{};
  await S.set('ef:rec:'+hoy,{...prev,checkinCompleto:false});
  state.rec[hoy]={...(state.rec[hoy]||{}),checkinCompleto:false};
  render();
}
async function completarSesion(){
  const hoy=new Date().toISOString().split('T')[0];
  const diaHoy=new Date().getDay();
  const sesion=(state.plan||PLAN_DEFAULT).sesiones?.find(s=>s.dia===diaHoy);
  await S.set('ef:log:'+hoy,{fecha:hoy,sesionNombre:sesion?.nombre,
    ejercicios:sesion?.ejercicios?.map(e=>({nombre:e.n,series:[]}))||[],
    energia:state.energia,suenoAnoche:state.sueno,faseCiclo:state.fase,completada:true});
  const prevRec=await S.get('ef:rec:'+hoy)||{};
  await S.set('ef:rec:'+hoy,{...prevRec,sueno:state.sueno,energia:state.energia});
  state.logGuardado=true;
  state.logs[hoy]={completada:true};
  render();
}

// ── SEMANA ─────────────────────────────────────────────────
function renderSemana(){
  const hoy=new Date(); const diaHoy=hoy.getDay();
  const plan=state.plan||PLAN_DEFAULT;
  let completadas=0,total=plan.sesiones?.length||4;
  for(const s of (plan.sesiones||[])){
    const d=new Date(hoy); d.setDate(d.getDate()+(s.dia-diaHoy));
    const f=d.toISOString().split('T')[0];
    if(state.logs[f]?.completada) completadas++;
  }
  let html=`<div class="card">
    <div class="row-between" style="margin-bottom:8px">
      <div class="card-label" style="margin-bottom:0">Adherencia semanal</div>
      <div style="font-family:'DM Mono',monospace;font-size:13px;color:${completadas>=total?'var(--green)':'var(--muted)'}">${completadas}/${total}</div>
    </div>
    <div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:${(completadas/total)*100}%;background:linear-gradient(90deg,var(--red),var(--accent))"></div></div></div>
  </div>`;

  html+=`<div class="week-grid" style="margin-bottom:12px">`;
  for(let d=0;d<7;d++){
    const sesion=(plan.sesiones||[]).find(s=>s.dia===d);
    const fd=new Date(hoy); fd.setDate(fd.getDate()+(d-diaHoy));
    const fstr=fd.toISOString().split('T')[0];
    const done=state.logs[fstr]?.completada;
    html+=`<div class="day-cell ${d===diaHoy?'today':''} ${done&&sesion?'done':''}">
      <div class="day-name">${DIAS[d]}</div>
      ${sesion?`<div class="day-icon">${done?'✓':'🏋️'}</div>`:`<div class="day-dot"></div>`}
    </div>`;
  }
  html+=`</div>`;

  // Recuperación 7 días
  const dias7=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const f=d.toISOString().split('T')[0];
    const r=state.rec[f];
    if(r?.checkinCompleto) dias7.push({f:f.slice(5),s:calcScore(r)});
  }
  if(dias7.length>0){
    html+=`<div class="card"><div class="card-label">Recuperación 7 días</div>
      <div style="display:flex;gap:5px;align-items:flex-end;height:48px;margin-bottom:8px">
        ${dias7.map(d=>{const h=Math.round((d.s/10)*48);const c=d.s>=7?'var(--green)':d.s>=5?'var(--amber)':'var(--red)';

function getUltimoPeso(nombre){
  const fechas=Object.keys(state.logs).sort().reverse();
  for(const f of fechas){
    const log=state.logs[f];
    const ej=log.ejercicios?.find(e=>e.nombre===nombre||e.n===nombre);
    if(ej?.series?.length){const mp=Math.max(...ej.series.map(s=>s.peso||0));if(mp>0)return mp;}
  }
  return null;
}
function calcProg(nombre){
  return Object.entries(state.logs).sort(([a],[b])=>a.localeCompare(b))
    .map(([fecha,log])=>{
      const ej=log.ejercicios?.find(e=>e.nombre===nombre||e.n===nombre);
      if(!ej?.series?.length)return null;
      const maxPeso=Math.max(...ej.series.map(s=>s.peso||0));
      if(!maxPeso)return null;
      const reps=ej.series.find(s=>s.peso===maxPeso)?.reps||1;
      return{fecha:fecha.slice(5),peso:maxPeso,rm:+(maxPeso*(1+reps/30)).toFixed(1)};
    }).filter(Boolean);
}

function drawProgChart(datos){
  const canvas=document.getElementById('prog-chart');
  if(!canvas||!datos.length)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth; const H=100;
  canvas.width=W*dpr; canvas.height=H*dpr; ctx.scale(dpr,dpr);
  const pesos=datos.map(d=>d.peso);
  const minP=Math.min(...pesos)*0.97,maxP=Math.max(...pesos)*1.03;
  const pad={l:32,r:8,t:8,b:22};
  const w=W-pad.l-pad.r,h=H-pad.t-pad.b;
  function px(i){return pad.l+(i/(datos.length-1||1))*w;}
  function py(v){return pad.t+h-((v-minP)/(maxP-minP||1))*h;}
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  for(let i=0;i<3;i++){
    const y=pad.t+h*(i/2);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+w,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px DM Mono';ctx.textAlign='right';
    ctx.fillText((minP+(maxP-minP)*(1-i/2)).toFixed(0),pad.l-4,y+3);
  }
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+h);
  grad.addColorStop(0,'rgba(232,255,107,0.2)');grad.addColorStop(1,'rgba(232,255,107,0)');
  ctx.beginPath();ctx.moveTo(px(0),py(datos[0].peso));
  datos.forEach((d,i)=>ctx.lineTo(px(i),py(d.peso)));
  ctx.lineTo(px(datos.length-1),H-pad.b);ctx.lineTo(pad.l,H-pad.b);
  ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.strokeStyle='#e8ff6b';ctx.lineWidth=2;ctx.lineJoin='round';
  datos.forEach((d,i)=>i===0?ctx.moveTo(px(i),py(d.peso)):ctx.lineTo(px(i),py(d.peso)));
  ctx.stroke();
  datos.forEach((d,i)=>{ctx.beginPath();ctx.arc(px(i),py(d.peso),3,0,Math.PI*2);ctx.fillStyle='#e8ff6b';ctx.fill();});
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px DM Mono';ctx.textAlign='center';
  if(datos[0])ctx.fillText(datos[0].fecha,px(0),H-pad.b+14);
  if(datos.length>1)ctx.fillText(datos[datos.length-1].fecha,px(datos.length-1),H-pad.b+14);
}

async function eliminarSerie(ejNombre,idx){
  const hoy=new Date().toISOString().split('T')[0];

async function guardarSerieRapido(ejNombre){
  const peso=parseFloat(document.getElementById('log-peso')?.value);

  const rpe=parseInt(document.getElementById('log-rpe')?.value)||null;
  if(!reps){document.getElementById('log-reps')?.focus();return;}
  const hoy=new Date().toISOString().split('T')[0];
  const log=await S.get('ef:log:'+hoy)||{fecha:hoy,ejercicios:[],completada:false};
  const ejIdx=log.ejercicios.findIndex(e=>e.nombre===ejNombre||e.n===ejNombre);
  const serie={...(peso?{peso}:{}),reps,...(rpe?{rpe}:{})};
  if(ejIdx>=0)log.ejercicios[ejIdx].series=[...(log.ejercicios[ejIdx].series||[]),serie];
  else log.ejercicios.push({nombre:ejNombre,series:[serie]});
  await S.set('ef:log:'+hoy,log); state.logs[hoy]=log;
  document.getElementById('log-reps').value='';
  if(document.getElementById('log-rpe'))document.getElementById('log-rpe').value='';
  const msg=document.getElementById('log-msg');
  if(msg){msg.style.display='block';setTimeout(()=>{if(msg)msg.style.display='none';},1500);}

}

  const peso=parseFloat(document.getElementById('n-peso').value);
  if(!peso)return;
  const grasa=parseFloat(document.getElementById('n-grasa').value)||null;
  const musculo=parseFloat(document.getElementById('n-musculo').value)||null;
  const nueva=[...state.composicion,{fecha:new Date().toISOString().split('T')[0],peso,porcGrasa:grasa,masaMuscular:musculo,fuente:'manual'}];
  await S.set('ef:composicion',nueva); state.composicion=nueva; render();
}

// ── CICLO ──────────────────────────────────────────────────
function renderCiclo(){
  const c=state.ciclo; const f=state.fase?FASES[state.fase]:null;
  let html='';
  if(f){
    html+=`<div class="card" style="border-color:${f.badgeBorder};background:${f.badgeBg}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <div style="font-size:32px">${f.emoji}</div>
        <div><div style="font-size:18px;font-weight:800;color:${f.badgeColor}">${f.label}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.5)">Día ${state.diaDelCiclo} del ciclo</div></div>
      </div>
      <div style="font-size:13px;font-weight:600;color:${f.badgeColor};margin-bottom:4px">${f.intensidad}</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.6);line-height:1.55">${f.tip}</div>
    </div>`;
  }
  html+=`<div class="card"><div class="card-label">Datos del ciclo</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div><div style="font-size:12px;color:var(--muted);margin-bottom:5px">Primer día del último período</div>
        <input class="inp" type="date" id="c-periodo" value="${c?.ultimoPeriodo||''}"></div>
      <div class="inp-row">
        <div style="flex:1"><div style="font-size:12px;color:var(--muted);margin-bottom:5px">Duración del ciclo (días)</div>
          <input class="inp" type="number" id="c-duracion" value="${c?.duracion||25}" min="21" max="35"></div>
        <div style="flex:1"><div style="font-size:12px;color:var(--muted);margin-bottom:5px">Duración período (días)</div>
          <input class="inp" type="number" id="c-periodo-dur" value="${c?.duracionPeriodo||4}" min="2" max="8"></div>
      </div>
      <button class="hc-btn primary" onclick="guardarCiclo()">Actualizar ciclo</button>
    </div></div>`;
  html+=`<div class="card"><div class="card-label">Guía por fase</div>`;
  for(const [key,fase] of Object.entries(FASES)){
    const actual=state.fase===key;
    html+=`<div class="phase-row ${actual?'current':''}">
      <div class="phase-emoji">${fase.emoji}</div>
      <div class="phase-info"><div class="phase-name">${fase.label}</div><div class="phase-desc">${fase.intensidad}</div></div>
      ${actual?`<div class="phase-now">← ahora</div>`:''}
    </div>`;
  }
  html+=`</div>`;
  return html;
}
async function guardarCiclo(){
  const ultimoPeriodo=document.getElementById('c-periodo').value;
  const duracion=parseInt(document.getElementById('c-duracion').value)||25;
  const duracionPeriodo=parseInt(document.getElementById('c-periodo-dur').value)||4;
  const ciclo={ultimoPeriodo,duracion,duracionPeriodo};
  await S.set('ef:ciclo',ciclo);
  state.ciclo=ciclo; state.fase=calcFase(ciclo); state.diaDelCiclo=calcDiaCiclo(ciclo);
  render();
}

// ── AJUSTES ────────────────────────────────────────────────
function renderAjustes(){
  const plan=state.plan||PLAN_DEFAULT;
  let html=`<div class="card">
    <div class="card-label">Distribución de sesiones</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5">Asigna cada sesión al día que prefieras. Puedes cambiarlos cuando quieras.</div>
    <div style="display:flex;flex-direction:column;gap:10px">`;
  plan.sesiones?.forEach((s,i)=>{
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.02)">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700">${s.nombre}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${s.ejercicios.length} ejercicios · ${s.duracion}min</div>
      </div>
      <select class="dia-select" id="dia-sesion-${i}" onchange="actualizarDiaSesion(${i},this.value)">
        ${[0,1,2,3,4,5,6].map(d=>`<option value="${d}" ${s.dia===d?'selected':''}>${DIAS_FULL[d]}</option>`).join('')}
        <option value="-1" ${s.dia===-1?'selected':''}>— Sin asignar</option>
      </select>
    </div>`;
  });
  html+=`</div></div>`;

  html+=`<div class="card">
    <div class="card-label">Días de descanso actuales</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">`;
  const diasConSesion=new Set(plan.sesiones?.map(s=>s.dia)||[]);
  for(let d=0;d<7;d++){
    const tiene=diasConSesion.has(d);
    html+=`<span style="padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid;background:${tiene?'rgba(232,255,107,0.1)':'rgba(255,255,255,0.03)'};border-color:${tiene?'rgba(232,255,107,0.3)':'var(--border)'};color:${tiene?'var(--accent)':'var(--muted)'}">${DIAS_FULL[d]} ${tiene?'💪':'🛋️'}</span>`;
  }
  html+=`</div></div>`;

  html+=`<div class="card">
    <div class="card-label" style="margin-bottom:4px">Historial Hevy</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px">45 sesiones cargadas · oct 2025 → may 2026</div>
    <div class="banner green" style="margin-bottom:0">✓ Historial cargado automáticamente</div>
  </div>`;

  html+=`<div class="card">
    <div class="card-label">Reiniciar datos</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Borra todo el progreso guardado. Útil si quieres empezar desde cero.</div>
    <button class="hc-btn secondary" onclick="resetearTodo()" style="color:var(--red);border-color:rgba(255,107,107,0.3)">⚠️ Borrar todos los datos</button>
  </div>`;

  return html;
}

async function actualizarDiaSesion(idx,diaStr){
  const plan=JSON.parse(JSON.stringify(state.plan||PLAN_DEFAULT));
  plan.sesiones[idx].dia=parseInt(diaStr);
  await S.set('ef:plan',plan); state.plan=plan; render();
}
async function resetearTodo(){
  if(!confirm('¿Segura? Esto borra todo el progreso guardado.'))return;
  // Borrar logs
  for(let i=0;i<90;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    try{await window.storage.delete('ef:log:'+d.toISOString().split('T')[0]);}catch{}
  }
  try{await window.storage.delete('ef:ciclo');}catch{}
  try{await window.storage.delete('ef:composicion');}catch{}
  try{await window.storage.delete('ef:plan');}catch{}
  try{await window.storage.delete('ef:hevy:cargado');}catch{}
  state={tab:'ajustes',ciclo:null,fase:null,diaDelCiclo:null,plan:null,logs:{},composicion:[],rec:{},energia:3,sueno:7.5,agua:2,checked:{},logGuardado:false,semana:1,ejSel:null,hevyCargado:false};
  await loadState();
}

// ── INIT ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',async()=>{
  document.getElementById('tabs').addEventListener('click',e=>{
    const btn=e.target.closest('.tab'); if(!btn)return;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active'); state.tab=btn.dataset.tab; render();
  });
  await loadState();
});
</script>
</body>
</html>
